<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyTalkZone — Rooms Hub</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/app.css" />
  <style>
    :root{
      --mz-bg:#0f172a; --mz-card:#0b1226; --mz-grad-a:#6d28d9; --mz-grad-b:#06b6d4;
      --mz-text:#e5e7eb; --mz-muted:#94a3b8;
    }
    body { background: var(--mz-bg); color: var(--mz-text); }
    .hub { max-width: 1040px; margin: 0 auto; padding: 16px; }
    .hero {
      position: relative; border-radius: 18px; padding: 28px 22px; overflow: hidden;
      background:
        radial-gradient(1200px 360px at -10% -20%, rgba(109,40,217,.18), transparent 60%),
        radial-gradient(1200px 360px at 110% 120%, rgba(6,182,212,.18), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.06); box-shadow: 0 10px 40px rgba(0,0,0,.25);
    }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand .logo { width:40px; height:40px; border-radius:12px; background:linear-gradient(45deg,var(--mz-grad-a),var(--mz-grad-b)); box-shadow:0 6px 18px rgba(6,182,212,.35); }
    .brand h1 { font-size: 1.35rem; margin:0; letter-spacing:.2px; }
    .brand small { color: var(--mz-muted); }
    .hero-tools{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .ghost{ padding:8px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.02); color:var(--mz-text); cursor:pointer; }
    .ghost:disabled{ opacity:.45; cursor:default; }
    #search{ min-width:240px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(15,23,42,.65); color:var(--mz-text); }
    #search::placeholder{ color:#9aa4b2; }
    .status-strip{ margin-top:10px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; color:var(--mz-muted); font-size:.92rem; }
    .room-card{ border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:14px 16px; margin-bottom:12px; background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01)); box-shadow:0 6px 20px rgba(0,0,0,.25); }
    .room-title{ font-weight:600; font-size:1.05rem; }
    .muted{ color: var(--mz-muted); }
    .btn-soft{ padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.02); cursor:pointer; color:var(--mz-text); }
    .badge{ font-size:.75rem; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--mz-text); }
    .pill{ padding:4px 10px; border-radius:999px; font-size:.75rem; }
    .pill-live{ border:1px solid rgba(16,185,129,.35); background:rgba(16,185,129,.08); }
    .pill-private{ border:1px solid rgba(148,163,184,.35); background:rgba(148,163,184,.10); }
    .text-note{ color: var(--mz-muted); }
    @media (max-width:640px){ .hero{ padding:20px 16px; } }
  </style>
</head>
<body>
  <div class="hub">
    <!-- HERO -->
    <div class="hero mb-3">
      <div class="d-flex justify-content-between align-items-start">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1>MyTalkZone</h1>
            <small>Browse, search and join live rooms.</small>
          </div>
        </div>
        <div class="hero-tools">
          <input id="search" class="form-control form-control-sm" placeholder="Search rooms…">
          <button id="createRoomBtn" class="ghost d-none">Create room</button>
          <!-- Only visible login in the UI -->
          <button id="loginHero" class="ghost">Login</button>
          <button id="logoutHero" class="ghost d-none">Logout</button>
          <a href="/admin" class="ghost">Admin</a>
        </div>
      </div>
      <div class="status-strip">
        <span class="badge">Hub</span>
        <span class="text-note">Only whitelisted users can create rooms.</span>
      </div>
    </div>

    <!-- Hidden login card (kept for deso.js hooks; not visible) -->
    <div style="display:none;">
      <div id="deso-user" class="small text-note"></div>
      <button id="deso-login"></button>
      <button id="deso-logout" style="display:none;"></button>
      <div id="wallet-info" style="display:none;"></div>
    </div>

    <!-- Rooms list -->
    <div id="rooms"></div>
    <p class="muted" id="emptyMsg" style="display:none;">No active rooms yet. When someone creates a room, it will appear here.</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/assets/js/deso.js"></script>
  <script src="/assets/js/hub.js"></script>
</body>
</html>
